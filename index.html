<!DOCTYPE html>
<!-- HTML
     ElevationMap_p5js
     国土地理院標高データ 3D地形ビューア（p5.js WEBGL版）
     Version: 1.1.0
-->
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>国土地理院 標高地形ビューア — p5.js WEBGL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #111; overflow: hidden; touch-action: none; }
        canvas { display: block; }

        /* ローディング画面 */
        #loading-screen {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: #0a0a0a;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 100; font-family: monospace; color: #00BFFF;
        }
        #loading-screen h2 { font-size: 1.4rem; margin-bottom: 20px; letter-spacing: 0.15em; }
        .progress-bar { width: 300px; height: 4px; background: #222; border-radius: 2px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #00BFFF, #0080FF);
                         animation: bar 1.8s ease-in-out infinite; }
        @keyframes bar {
            0%   { width:0%;  margin-left:0%; }
            50%  { width:60%; margin-left:20%; }
            100% { width:0%;  margin-left:100%; }
        }
        #loading-msg { margin-top: 14px; font-size: 0.8rem; color: #4488aa; }

        /* 操作ガイド（HTMLオーバーレイ） */
        #guide {
            position: fixed; top: 14px; left: 14px;
            background: rgba(0,0,0,0.65);
            color: #fff; font-family: monospace; font-size: 13px;
            padding: 12px 16px; border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.15);
            line-height: 1.9;
            pointer-events: none;
            z-index: 10;
        }
        #guide-toggle {
            position: fixed; top: 14px; right: 14px;
            background: rgba(0,0,0,0.6);
            color: #aaa; font-family: monospace; font-size: 12px;
            padding: 6px 12px; border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.2);
            cursor: pointer; z-index: 10;
        }
        #guide-toggle:hover { background: rgba(255,255,255,0.1); color: #fff; }
    </style>
</head>
<body>

<!-- ローディング -->
<div id="loading-screen">
    <h2>📡 標高データ読み込み中...</h2>
    <div class="progress-bar"><div class="progress-fill"></div></div>
    <div id="loading-msg">国土地理院 GSI DEM データを解析中</div>
</div>

<!-- 操作ガイド -->
<div id="guide">
    【操作ガイド】<br>
    ドラッグ　　: 視点を回転<br>
    右ドラッグ　: 平行移動<br>
    スクロール　: ズーム<br>
    ピンチ(タッチ): ズーム
</div>
<button id="guide-toggle" onclick="toggleGuide()">ガイドを隠す</button>

<script>
function toggleGuide() {
    const g = document.getElementById('guide');
    const b = document.getElementById('guide-toggle');
    if (g.style.display === 'none') {
        g.style.display = 'block';
        b.textContent = 'ガイドを隠す';
    } else {
        g.style.display = 'none';
        b.textContent = 'ガイドを表示';
    }
}
</script>

<script src="sketch.js"></script>
</body>
</html>
